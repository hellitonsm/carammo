<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarAmmo — Corrida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="menu">
    <div class="menu-bg" aria-hidden="true"></div>
    <div class="menu-content">
      <p class="menu-brand">CarAmmo</p>
      <h1>Escolha seu carro</h1>
      <p class="menu-sub">3 voltas · circuito fechado</p>
      <div id="car-select">
        <button type="button" class="car-option" data-color="0xd62828" data-name="Vermelho">
          <span class="car-preview" style="--car:#d62828"></span>
          <span>Vermelho</span>
        </button>
        <button type="button" class="car-option" data-color="0x1e6bb8" data-name="Azul">
          <span class="car-preview" style="--car:#1e6bb8"></span>
          <span>Azul</span>
        </button>
        <button type="button" class="car-option" data-color="0x2a9d5c" data-name="Verde">
          <span class="car-preview" style="--car:#2a9d5c"></span>
          <span>Verde</span>
        </button>
      </div>
      <button id="start-btn" disabled>Largada</button>
      <p class="menu-hint">W/S acelerar · A/D virar · Espaço freio · R reset</p>
    </div>
  </div>

  <div id="countdown" hidden></div>

  <div id="hud" hidden>
    <div class="hud-left">
      <div id="speed">0<span>km/h</span></div>
      <div class="hud-meta">
        <div id="lap">Volta 0 / 3</div>
        <div id="lap-time">00:00.000</div>
        <div id="best-time">Melhor —</div>
      </div>
    </div>
    <canvas id="minimap" width="180" height="180"></canvas>
    <div id="info">W/S · A/D · Espaço · R</div>
  </div>

  <div id="finish" hidden>
    <div class="finish-card">
      <p class="finish-brand">CarAmmo</p>
      <h2>Corrida concluída</h2>
      <p id="finish-best">Melhor volta: —</p>
      <p id="finish-total">Tempo total: —</p>
      <button type="button" id="restart-btn">Correr de novo</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/kripken/ammo.js@main/builds/ammo.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
