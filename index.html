<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarAmmo Deluxe</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- Menu -->
  <div id="menu">
    <div class="menu-bg"></div>
    <div class="menu-content">
      <h1 class="logo">CarAmmo Deluxe</h1>
      <p class="tagline">Corrida 3D · Física Bullet · IA Neural no navegador</p>

      <div class="section-title">Cenário</div>
      <div class="scene-grid" id="scene-select">
        <button class="scene-option" data-scene="forest" type="button">
          <div class="scene-thumb">🌲</div>
          <span class="scene-name">Floresta</span>
          <span class="scene-desc">Asfalto · overpass · pinheiros</span>
        </button>
        <button class="scene-option" data-scene="desert" type="button">
          <div class="scene-thumb">🏜️</div>
          <span class="scene-name">Deserto</span>
          <span class="scene-desc">Areia · cânions · cactos</span>
        </button>
        <button class="scene-option" data-scene="snow" type="button">
          <div class="scene-thumb">❄️</div>
          <span class="scene-name">Nevasca</span>
          <span class="scene-desc">Gelo · ponte · baixa aderência</span>
        </button>
      </div>

      <div class="section-title">Cor do carro</div>
      <div class="car-grid" id="car-select">
        <button class="car-option" data-color="d62828" type="button" title="Vermelho">
          <div class="car-preview" style="background:#d62828"></div>
        </button>
        <button class="car-option" data-color="1e6bb8" type="button" title="Azul">
          <div class="car-preview" style="background:#1e6bb8"></div>
        </button>
        <button class="car-option" data-color="2a9d5c" type="button" title="Verde">
          <div class="car-preview" style="background:#2a9d5c"></div>
        </button>
        <button class="car-option" data-color="f4c430" type="button" title="Amarelo">
          <div class="car-preview" style="background:#f4c430"></div>
        </button>
        <button class="car-option" data-color="1a1a1a" type="button" title="Preto">
          <div class="car-preview" style="background:#1a1a1a"></div>
        </button>
      </div>

      <div class="section-title">Opções</div>
      <div class="options-row">
        <label class="opt"><input type="checkbox" id="opt-ai" checked /> Adversários IA</label>
        <label class="opt"><input type="checkbox" id="opt-nitro" checked /> Nitro</label>
        <label class="opt"><input type="checkbox" id="opt-neural" checked /> IA Neural (DQN)</label>
      </div>

      <div class="ai-panel">
        <span id="ai-status" class="ai-status-text">IA neural: carregando…</span>
        <button id="reset-ai-btn" class="btn small" type="button">Resetar IA</button>
      </div>

      <button id="start-btn" class="btn primary" type="button" disabled>Iniciar Corrida</button>

      <p class="controls-hint">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> dirigir ·
        <kbd>Espaço</kbd> freio de mão ·
        <kbd>Shift</kbd> nitro ·
        <kbd>C</kbd> câmera ·
        <kbd>R</kbd> reset ·
        <kbd>ESC</kbd> pausa
      </p>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" hidden>
    <div class="hud-left">
      <div id="speed">0<span>km/h</span></div>
      <div class="hud-meta">
        <div><span class="label">Volta</span> <span id="lap">Volta 1 / 3</span></div>
        <div><span class="label">Tempo</span> <span id="lap-time">00:00.000</span></div>
        <div><span class="label">Melhor</span> <span id="best-time">--:--.---</span></div>
      </div>
    </div>
    <div id="nitro-bar-wrap">
      <div id="nitro-bar"></div>
    </div>
    <canvas id="minimap" width="200" height="200"></canvas>
    <div id="position-info">Posição: 1/4</div>
  </div>

  <div id="countdown" hidden>3</div>
  <div id="pause-overlay" hidden>PAUSA</div>
  <div id="race-results" hidden></div>

  <!-- Ammo.js (WASM, global) -->
  <script src="https://cdn.jsdelivr.net/gh/kripken/ammo.js@main/builds/ammo.js"></script>
  <!-- Neural net + RL agent (globals, before modules) -->
  <script src="neural-net.js"></script>
  <script src="rl-agent.js"></script>
  <!-- Entry point -->
  <script type="module" src="main.js"></script>
</body>
</html>
